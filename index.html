<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>saphlick</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0a12;
    --surface: #16101f;
    --card: #1c1428;
    --accent: #e63f6e;
    --accent2: #b06fd8;
    --gold: #f0c060;
    --text: #f0eaf8;
    --muted: #9080a8;
    --border: rgba(176,111,216,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-weight: 300;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(230,63,110,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 85% 80%, rgba(176,111,216,0.14) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; position: relative; z-index: 1; }

  /* HEADER */
  header { text-align: center; padding: 64px 0 48px; }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e63f6e 0%, #b06fd8 50%, #f0c060 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; margin-bottom: 10px;
  }
  .tagline { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 36px; }
  .header-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); margin: 0 auto 40px; }

  /* SYNC DOT */
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #3a2f4a; display: inline-block; margin-left: 8px; vertical-align: middle; transition: background 0.3s; }
  .sync-dot.live    { background: #4cd97b; }
  .sync-dot.loading { background: var(--gold); animation: pulse 0.8s infinite; }
  .sync-dot.error   { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 28px; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 100px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    padding: 10px 18px 10px 40px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
  .sort-select {
    background: var(--card); border: 1px solid var(--border); border-radius: 100px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    padding: 10px 18px; outline: none; cursor: pointer;
  }
  .sort-select option { background: var(--card); }
  .add-bar-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none;
    border-radius: 100px; padding: 10px 22px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .add-bar-btn:hover { opacity: 0.88; transform: scale(1.02); }

  /* CITY PILLS */
  .city-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; align-items: center; }
  .city-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-right: 2px; }
  .city-pill {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 5px 15px; border-radius: 100px; font-size: 0.8rem; cursor: pointer;
    transition: all 0.18s; font-family: 'DM Sans', sans-serif;
  }
  .city-pill:hover { border-color: var(--accent2); color: var(--text); }
  .city-pill.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 18px;
    color: var(--text); display: flex; align-items: center; gap: 14px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* LEADERBOARD */
  .leaderboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; margin-bottom: 52px; }
  .lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; transition: border-color 0.2s; }
  .lb-card:hover { border-color: rgba(176,111,216,0.4); }
  .lb-rank { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px; }
  .lb-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; line-height: 1.25; margin-bottom: 3px; }
  .lb-city { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
  .lb-score { font-size: 1.5rem; font-family: 'Playfair Display', serif; color: var(--gold); font-weight: 700; }

  /* BAR CARDS */
  .bars-list { display: flex; flex-direction: column; gap: 18px; }
  .bar-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .bar-card:hover { border-color: rgba(176,111,216,0.4); transform: translateY(-2px); }
  .bar-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 22px 24px 0; cursor: pointer; user-select: none; }
  .bar-meta { flex: 1; }
  .bar-city-tag { display: inline-block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.13em; color: var(--accent2); background: rgba(176,111,216,0.1); border-radius: 100px; padding: 2px 10px; margin-bottom: 6px; }
  .bar-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--text); line-height: 1.2; }
  .bar-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.65; padding: 8px 24px 16px; font-style: italic; }
  .bar-avg { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .avg-score { font-family: 'Playfair Display', serif; font-size: 2.1rem; font-weight: 700; line-height: 1; color: var(--gold); }
  .avg-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .avg-stars { font-size: 0.85rem; color: var(--gold); letter-spacing: 1px; }

  /* RATING FORM */
  .rating-form { padding: 0 24px 24px; border-top: 1px solid var(--border); display: none; }
  .bar-card.open .rating-form { display: block; }
  .form-title { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin: 18px 0 14px; }
  .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .category-item { display: flex; flex-direction: column; gap: 6px; }
  .cat-label { font-size: 0.78rem; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  .cat-score-display { font-weight: 500; color: var(--accent2); min-width: 24px; text-align: right; }
  .star-row { display: flex; gap: 4px; }
  .star { font-size: 1.3rem; cursor: pointer; color: #3a2f4a; transition: color 0.12s, transform 0.1s; line-height: 1; }
  .star:hover, .star.lit { color: var(--gold); }
  .star:active { transform: scale(0.85); }
  .input-group { display: flex; flex-direction: column; gap: 5px; }
  .input-group label { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .input-group input, .input-group textarea {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    padding: 10px 14px; width: 100%; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus { border-color: var(--accent2); }
  .input-group textarea { resize: vertical; min-height: 68px; }
  .submit-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none;
    border-radius: 100px; padding: 11px 30px; font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .submit-btn:hover { opacity: 0.88; transform: scale(1.02); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* REVIEWS */
  .reviews-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); display: none; }
  .bar-card.open .reviews-section { display: block; }
  .reviews-title { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 12px; }
  .review-item { background: var(--surface); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; border-left: 2px solid var(--accent2); }
  .review-top { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
  .reviewer-name { font-size: 0.83rem; font-weight: 500; color: var(--accent2); }
  .review-avg { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
  .review-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .review-cat-pill { font-size: 0.7rem; background: rgba(176,111,216,0.1); border-radius: 100px; padding: 2px 9px; color: var(--muted); }
  .review-cat-pill span { color: var(--text); font-weight: 500; }
  .review-note { font-size: 0.82rem; color: var(--muted); font-style: italic; line-height: 1.5; }
  .toggle-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 100px; padding: 6px 18px; font-size: 0.78rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .toggle-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .toggle-icon { display: inline-block; transition: transform 0.2s; font-style: normal; }
  .bar-card.open .toggle-icon { transform: rotate(180deg); }
  .no-reviews { font-size: 0.83rem; color: var(--muted); font-style: italic; }

  /* EMPTY / LOADING STATE */
  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-state .big { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: var(--text); }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(13,10,18,0.92); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card); border: 1px solid rgba(176,111,216,0.3); border-radius: 20px; padding: 36px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; background: linear-gradient(135deg, #e63f6e, #b06fd8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 4px; }
  .modal-grid .full { grid-column: 1 / -1; }
  .modal-actions { display: flex; gap: 12px; align-items: center; margin-top: 20px; flex-wrap: wrap; }
  .cancel-btn { background: transparent; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; padding: 4px; }
  .cancel-btn:hover { color: var(--text); }

  /* TOAST */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #fff; padding: 12px 28px; border-radius: 100px; font-size: 0.88rem; z-index: 999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding-top: 32px; border-top: 1px solid var(--border); letter-spacing: 0.08em; }
  footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
  footer a:hover { color: var(--accent2); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">saphlick</div>
    <div class="tagline">queer bar ratings <span class="sync-dot loading" id="syncDot"></span></div>
    <div class="header-divider"></div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search bars, cities, neighbourhoods...">
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="rating">Top rated</option>
      <option value="newest">Newest first</option>
      <option value="az">A – Z</option>
      <option value="mostrated">Most rated</option>
    </select>
    <button class="add-bar-btn" id="openAddBar">+ Add a bar</button>
  </div>

  <div class="city-filters" id="cityFilters"></div>

  <div id="leaderboardSection" style="display:none">
    <div class="section-title">Top picks</div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

  <div class="section-title">Bars</div>
  <div class="bars-list" id="barsList">
    <div class="empty-state"><div class="big">Loading…</div></div>
  </div>

  <footer style="margin-top:52px">
    made with <span style="color:var(--accent)">♥</span> for the crew · saphlick
  </footer>
</div>

<div id="toast"></div>

<!-- ADD BAR MODAL -->
<div class="modal-overlay" id="addBarModal">
  <div class="modal-box">
    <div class="modal-title">Add a bar</div>
    <div class="modal-grid">
      <div class="input-group full">
        <label>Bar name *</label>
        <input type="text" id="newBarName" placeholder="e.g. Taboo Bar">
      </div>
      <div class="input-group">
        <label>City *</label>
        <input type="text" id="newBarCity" placeholder="e.g. Amsterdam">
      </div>
      <div class="input-group">
        <label>Neighbourhood</label>
        <input type="text" id="newBarHood" placeholder="e.g. Jordaan">
      </div>
      <div class="input-group full" style="margin-top:2px">
        <label>Description (optional)</label>
        <textarea id="newBarDesc" placeholder="What's the vibe? What shouldn't people miss?"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="submit-btn" id="submitNewBar">Add bar</button>
      <button class="cancel-btn" id="closeAddBar">cancel</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// 🔧 REPLACE THESE TWO LINES WITH YOUR SUPABASE CREDENTIALS
const SUPABASE_URL = 'https://yszfxgqrgsssuvunyfif.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzemZ4Z3FyZ3Nzc3V2dW55ZmlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjI2NDAsImV4cCI6MjA4ODc5ODY0MH0.6vzq9bKHgdAN14inQ7os799rZnyO8C4bi83r7T-GeUg';
// ─────────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATEGORIES = [
  { id: 'drinks',   label: '🍹 Drinks'   },
  { id: 'crowd',    label: '👯 Crowd'    },
  { id: 'music',    label: '🎵 Music'    },
  { id: 'vibe',     label: '✨ Vibe'     },
  { id: 'bathroom', label: '🚻 Bathroom' },
  { id: 'staff',    label: '💅 Staff'    },
];

// State
let bars = [];
let ratings = {}; // barId -> array of rating rows
let activeCityFilter = 'all';
let searchQuery = '';
let sortMode = 'rating';

// ─── Sync dot ────────────────────────────────────────────────────────────────
function setSync(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }

// ─── Load all data ────────────────────────────────────────────────────────────
async function loadAll() {
  setSync('loading');
  try {
    const [{ data: barsData, error: e1 }, { data: ratingsData, error: e2 }] = await Promise.all([
      sb.from('bars').select('*').order('added_at', { ascending: true }),
      sb.from('ratings').select('*').order('created_at', { ascending: true }),
    ]);
    if (e1 || e2) throw new Error(e1?.message || e2?.message);

    bars = barsData || [];

    // Group ratings by bar_id
    ratings = {};
    (ratingsData || []).forEach(r => {
      if (!ratings[r.bar_id]) ratings[r.bar_id] = [];
      ratings[r.bar_id].push(r);
    });

    setSync('live');
    renderAll();
  } catch(err) {
    setSync('error');
    console.error('Load failed:', err);
    document.getElementById('barsList').innerHTML =
      `<div class="empty-state"><div class="big">Connection error</div><p>Check your Supabase credentials in the code.</p></div>`;
  }
}

// ─── Realtime subscriptions ───────────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel('public-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bars' }, () => loadAll())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ratings' }, () => loadAll())
    .subscribe();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function avgRatings(barId) {
  const rs = ratings[barId] || [];
  if (!rs.length) return null;
  let overall = 0;
  const avgs = {};
  CATEGORIES.forEach(c => {
    const avg = rs.reduce((sum, r) => sum + (r[c.id] || 0), 0) / rs.length;
    avgs[c.id] = avg;
    overall += avg;
  });
  avgs._overall = overall / CATEGORIES.length;
  return avgs;
}

function scoreToStars(n) {
  const f = Math.round(n);
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function allCities() {
  return [...new Set(bars.map(b => b.city).filter(Boolean))].sort();
}

function filteredBars() {
  let list = [...bars];
  if (activeCityFilter !== 'all') list = list.filter(b => b.city === activeCityFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b =>
      b.name.toLowerCase().includes(q) ||
      (b.city||'').toLowerCase().includes(q) ||
      (b.neighborhood||'').toLowerCase().includes(q) ||
      (b.description||'').toLowerCase().includes(q)
    );
  }
  if (sortMode === 'rating') {
    list.sort((a, b) => {
      const aa = avgRatings(a.id), bb = avgRatings(b.id);
      return (bb ? bb._overall : -1) - (aa ? aa._overall : -1);
    });
  } else if (sortMode === 'newest') {
    list.sort((a, b) => (b.added_at||0) - (a.added_at||0));
  } else if (sortMode === 'az') {
    list.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortMode === 'mostrated') {
    list.sort((a, b) => (ratings[b.id]||[]).length - (ratings[a.id]||[]).length);
  }
  return list;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderCityFilters();
  const list = filteredBars();
  renderLeaderboard(list);
  renderBars(list);
}

function renderCityFilters() {
  const cities = allCities();
  const el = document.getElementById('cityFilters');
  el.innerHTML = `
    <span class="city-label">City</span>
    <button class="city-pill${activeCityFilter==='all'?' active':''}" data-city="all">All</button>
    ${cities.map(c => `<button class="city-pill${activeCityFilter===c?' active':''}" data-city="${c}">${c}</button>`).join('')}
  `;
  el.querySelectorAll('.city-pill').forEach(btn =>
    btn.addEventListener('click', () => { activeCityFilter = btn.dataset.city; renderAll(); })
  );
}

function renderLeaderboard(list) {
  const section = document.getElementById('leaderboardSection');
  const lb = document.getElementById('leaderboard');
  const rated = list.map(b => ({ bar: b, avg: avgRatings(b.id) }))
    .filter(x => x.avg)
    .sort((a, b) => b.avg._overall - a.avg._overall)
    .slice(0, 6);
  if (!rated.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  lb.innerHTML = rated.map((x, i) => `
    <div class="lb-card">
      <div class="lb-rank">#${i+1}</div>
      <div class="lb-name">${x.bar.name}</div>
      <div class="lb-city">${x.bar.city||''}</div>
      <div class="lb-score">${x.avg._overall.toFixed(1)}</div>
    </div>
  `).join('');
}

function renderBars(list) {
  const el = document.getElementById('barsList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">Nothing here yet</div><p>Be the first to add a bar!</p></div>`;
    return;
  }
  el.innerHTML = list.map(buildBarCard).join('');

  list.forEach(bar => {
    const toggleCard = () => document.getElementById(`card-${bar.id}`).classList.toggle('open');
    document.getElementById(`toggle-${bar.id}`).addEventListener('click', toggleCard);
    document.getElementById(`toggle2-${bar.id}`).addEventListener('click', toggleCard);

    CATEGORIES.forEach(cat => {
      const stars = document.querySelectorAll(`#stars-${bar.id}-${cat.id} .star`);
      stars.forEach((star, idx) => {
        star.addEventListener('mouseenter', () => stars.forEach((s,i) => s.classList.toggle('lit', i<=idx)));
        star.addEventListener('mouseleave', () => {
          const cur = parseInt(document.getElementById(`val-${bar.id}-${cat.id}`).value||'0');
          stars.forEach((s,i) => s.classList.toggle('lit', i<cur));
        });
        star.addEventListener('click', () => {
          document.getElementById(`val-${bar.id}-${cat.id}`).value = idx+1;
          document.getElementById(`score-${bar.id}-${cat.id}`).textContent = idx+1;
          stars.forEach((s,i) => s.classList.toggle('lit', i<=idx));
        });
      });
    });

    document.getElementById(`submit-${bar.id}`).addEventListener('click', async () => {
      const name = document.getElementById(`name-${bar.id}`).value.trim() || 'Anonymous';
      const note = document.getElementById(`note-${bar.id}`).value.trim();
      const row = { bar_id: bar.id, reviewer_name: name, note };
      let anyFilled = false;
      CATEGORIES.forEach(c => {
        const v = parseInt(document.getElementById(`val-${bar.id}-${c.id}`).value||'0');
        row[c.id] = v;
        if (v > 0) anyFilled = true;
      });
      if (!anyFilled) { showToast('Rate at least one category!', true); return; }

      const btn = document.getElementById(`submit-${bar.id}`);
      btn.textContent = 'Saving…'; btn.disabled = true;
      const { error } = await sb.from('ratings').insert([row]);
      btn.textContent = 'Submit Rating'; btn.disabled = false;
      if (error) { showToast('Error saving — try again', true); return; }
      showToast('Rating saved ✓');
      // realtime will trigger reload, but also do it manually for speed
      await loadAll();
      setTimeout(() => {
        const card = document.getElementById(`card-${bar.id}`);
        if (card) card.classList.add('open');
      }, 50);
    });
  });
}

function buildBarCard(bar) {
  const avgs = avgRatings(bar.id);
  const rs = ratings[bar.id] || [];

  const overallDisplay = avgs
    ? `<div class="avg-score">${avgs._overall.toFixed(1)}</div>
       <div class="avg-stars">${scoreToStars(avgs._overall)}</div>
       <div class="avg-label">${rs.length} rating${rs.length!==1?'s':''}</div>`
    : `<div class="avg-label" style="font-size:0.73rem;text-align:right;color:var(--muted)">no ratings<br>yet</div>`;

  const catInputs = CATEGORIES.map(cat => `
    <div class="category-item">
      <div class="cat-label">${cat.label}
        <span class="cat-score-display" id="score-${bar.id}-${cat.id}">–</span>
      </div>
      <div class="star-row" id="stars-${bar.id}-${cat.id}">
        ${'<span class="star">★</span>'.repeat(5)}
      </div>
      <input type="hidden" id="val-${bar.id}-${cat.id}" value="0">
    </div>
  `).join('');

  const reviewsHtml = rs.length
    ? rs.slice().reverse().map(r => {
        const avg = CATEGORIES.reduce((s,c) => s+(r[c.id]||0), 0) / CATEGORIES.length;
        const pills = CATEGORIES.filter(c => r[c.id]>0)
          .map(c => `<span class="review-cat-pill">${c.label.split(' ')[0]} <span>${r[c.id]}/5</span></span>`).join('');
        return `
          <div class="review-item">
            <div class="review-top">
              <span class="reviewer-name">${r.reviewer_name || 'Anonymous'}</span>
              <span class="review-avg">${avg.toFixed(1)} ★</span>
            </div>
            <div class="review-cats">${pills}</div>
            ${r.note ? `<div class="review-note">"${r.note}"</div>` : ''}
          </div>`;
      }).join('')
    : `<div class="no-reviews">No ratings yet — be the first!</div>`;

  const cityTag = [bar.city, bar.neighborhood].filter(Boolean).join(' · ');

  return `
    <div class="bar-card" id="card-${bar.id}">
      <div class="bar-header" id="toggle-${bar.id}">
        <div class="bar-meta">
          ${cityTag ? `<div class="bar-city-tag">${cityTag}</div>` : ''}
          <div class="bar-name">${bar.name}</div>
        </div>
        <div class="bar-avg">${overallDisplay}</div>
      </div>
      ${bar.description ? `<div class="bar-desc">${bar.description}</div>` : ''}
      <div style="padding:0 24px 16px">
        <button class="toggle-btn" id="toggle2-${bar.id}">
          Rate &amp; Reviews <em class="toggle-icon">▼</em>
        </button>
      </div>
      <div class="rating-form">
        <div class="form-title">Your Rating</div>
        <div style="margin-bottom:14px">
          <div class="input-group" style="max-width:220px">
            <label>Your name</label>
            <input type="text" id="name-${bar.id}" placeholder="e.g. Sofia">
          </div>
        </div>
        <div class="categories-grid">${catInputs}</div>
        <div class="input-group" style="margin-bottom:16px">
          <label>Notes (optional)</label>
          <textarea id="note-${bar.id}" placeholder="Anything memorable? Spill..."></textarea>
        </div>
        <button class="submit-btn" id="submit-${bar.id}">Submit Rating</button>
      </div>
      <div class="reviews-section">
        <div class="reviews-title">Ratings from the crew</div>
        ${reviewsHtml}
      </div>
    </div>`;
}

// ─── Add Bar ──────────────────────────────────────────────────────────────────
document.getElementById('openAddBar').addEventListener('click', () => document.getElementById('addBarModal').classList.add('open'));
document.getElementById('closeAddBar').addEventListener('click', () => document.getElementById('addBarModal').classList.remove('open'));
document.getElementById('addBarModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addBarModal')) document.getElementById('addBarModal').classList.remove('open');
});

document.getElementById('submitNewBar').addEventListener('click', async () => {
  const name = document.getElementById('newBarName').value.trim();
  const city = document.getElementById('newBarCity').value.trim();
  const hood = document.getElementById('newBarHood').value.trim();
  const desc = document.getElementById('newBarDesc').value.trim();
  if (!name || !city) { showToast('Name and city are required', true); return; }

  const btn = document.getElementById('submitNewBar');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const { error } = await sb.from('bars').insert([{
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name, city, neighborhood: hood, description: desc,
    added_at: Date.now()
  }]);

  btn.textContent = 'Add bar'; btn.disabled = false;
  if (error) { showToast('Error adding bar — try again', true); return; }

  document.getElementById('addBarModal').classList.remove('open');
  ['newBarName','newBarCity','newBarHood','newBarDesc'].forEach(id => document.getElementById(id).value = '');
  showToast(`${name} added ✓`);
  await loadAll();
});

// ─── Search & Sort ────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderAll(); });
document.getElementById('sortSelect').addEventListener('change', e => { sortMode = e.target.value; renderAll(); });

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#c0392b' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadAll();
subscribeRealtime();
</script>
</body>
</html>
